apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: extension-acl-managedseeds
  annotations:
    authorization.gardener.cloud/extensions-serviceaccount-selector: '{"matchLabels":{"extension":"acl"}}'
  labels:
    authorization.gardener.cloud/custom-extensions-permissions: "true"
rules:
- apiGroups:
  - seedmanagement.gardener.cloud
  resources:
  - managedseeds
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - core.gardener.cloud
  resources:
  - shoots
  verbs:
  - get
  - list
  - watch
